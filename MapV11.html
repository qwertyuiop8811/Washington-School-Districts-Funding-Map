    `;

    // Parse CSV into a lookup dictionary
    const factorData = {};
    const lines = rawCSV.trim().split('\n');
    for (let i = 1; i < lines.length; i++) {
        const parts = lines[i].split(',');
        if (parts.length >= 5) {
            const district = parts[1].trim().toLowerCase();
            const factor = parseFloat(parts[2]);
            const homeValue = parseFloat(parts[4]);
            factorData[district] = { factor: factor, homeValue: homeValue };
        }
    }

    let geojsonLayer;
    let labelsLayer = L.layerGroup();
    const ZOOM_THRESHOLD = 10;

    map.on('zoomend', function() {
        const mapEl = document.getElementById('map');
        if (map.getZoom() >= ZOOM_THRESHOLD) {
            if (!map.hasLayer(labelsLayer)) {
                labelsLayer.addTo(map);
            }
            mapEl.classList.add('zoomed-in');
        } else {
            if (map.hasLayer(labelsLayer)) {
                labelsLayer.remove();
            }
            mapEl.classList.remove('zoomed-in');
        }
    });

    function getBaseFactor(factor) {
        if (factor >= 1.22) return 1.18;
        if (factor >= 1.18) return 1.18;
        if (factor >= 1.16) return 1.12;
        if (factor >= 1.12) return 1.12;
        if (factor >= 1.10) return 1.06;
        if (factor >= 1.06) return 1.06;
        if (factor >= 1.04) return 1.00;
        return 1.00;
    }

    function getColor(baseFactor) {
        return baseFactor >= 1.18 ? '#006d2c' :
               baseFactor >= 1.12 ? '#31a354' :
               baseFactor >= 1.06 ? '#a1d99b' :
                                    '#edf8e9';
    }

    function getDistrictName(feature) {
        const props = feature.properties;
        let rawName = props.SchoolDist || props.SD_Name || props.NAME || props.Name || props.LEAName || props.JNAME || props.Dist_Name || props.DIST_NAME || props.DistrictName || props.ShortName;
        
        if (!rawName) {
            for (let key in props) {
                if (typeof props[key] === 'string') {
                    let val = props[key].toLowerCase();
                    if (val.includes('school') || val.includes('district') || val.includes('knight') || val.includes('mary m') || key.toLowerCase().includes('name')) {
                        rawName = props[key];
                        break;
                    }
                }
                if (String(props[key]) === '23311') {
                    rawName = 'Mary M. Knight';
                    break;
                }
            }
        }
        
        if (!rawName || rawName === 'Unknown' || rawName.trim() === '') {
            const propsStr = JSON.stringify(props).toLowerCase();
            if (propsStr.includes('knight') || propsStr.includes('23311')) {
                rawName = 'Mary M. Knight';
            }
        }
        
        if (rawName) {
            return rawName
                .replace(/(?:\bschool district\b|\bpublic schools\b|\bs\.d\.\b|\bs\.d\b)/gi, '')
                .replace(/\s+/g, ' ')
                .trim();
        }
        
        return "Unknown";
    }

    function getCleanName(feature) {
        let name = getDistrictName(feature);
        let clean = name.toLowerCase()
            .replace(/school district/gi, '')
            .replace(/public schools/gi, '')
            .replace(/s\.d\./gi, '')
            .replace(/s\.d/gi, '')
            .trim();
        
        let props = feature.properties;
        let fullStr = JSON.stringify(props).toLowerCase();
        
        if (clean.includes('evergreen')) {
            if (fullStr.includes('clark') || fullStr.includes('114')) return 'evergreen (clark)';
            if (fullStr.includes('stevens') || fullStr.includes('205')) return 'evergreen (stevens)';
            return 'evergreen (clark)';
        }
        
        if (clean.includes('columbia')) {
            if (fullStr.includes('walla') || fullStr.includes('400')) return 'columbia (walla walla)';
            if (fullStr.includes('stevens') || fullStr.includes('206')) return 'columbia (stevens)';
        }
        
        if (clean.includes('mary m') || clean.includes('knight')) {
            return 'mary m. knight';
        }
        
        return clean;
    }

    function getDistrictData(feature) {
        let cleanName = getCleanName(feature);
        let dataObj = factorData[cleanName];

        if (!dataObj) {
            for (const [csvName, val] of Object.entries(factorData)) {
                let csvNoParens = csvName.replace(/\s*\(.*?\)\s*/g, '').trim();
                if (cleanName === csvNoParens) {
                    dataObj = val;
                    break;
                }
            }
        }
        if (!dataObj) {
            for (const [csvName, val] of Object.entries(factorData)) {
                if (cleanName.includes(csvName) || csvName.includes(cleanName)) {
                    if (Math.abs(cleanName.length - csvName.length) < 8) {
                        dataObj = val;
                        break;
                    }
                }
            }
        }
        return { dataObj, cleanName };
    }

    function style(feature) {
        let { dataObj } = getDistrictData(feature);
        let factor = dataObj ? dataObj.factor : 1.0;
        let baseFactor = getBaseFactor(factor);
        return {
            fillColor: getColor(baseFactor),
            weight: 1.5,
            opacity: 1,
            color: '#666',
            dashArray: '3',
            fillOpacity: 0.6
        };
    }

    function onEachFeature(feature, layer) {
        let name = getDistrictName(feature);
        let { dataObj, cleanName } = getDistrictData(feature);

        let factor = dataObj ? dataObj.factor : 1.0;
        let homeValue = dataObj ? dataObj.homeValue : 0;
        let baseFactor = getBaseFactor(factor);

        let formattedValue = homeValue ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(homeValue) : 'N/A';

        layer.bindTooltip(`<strong>${name}</strong><br/>Base Factor: ${baseFactor.toFixed(2)}<br/>Home Value: ${formattedValue}`, {
            sticky: true,
            className: 'custom-tooltip'
        });

        if (layer.getBounds) {
            let center = layer.getBounds().getCenter();
            
            if (cleanName === 'nooksack valley' || cleanName.includes('nooksack')) {
                center = L.latLng(48.91, -122.32); 
            } else if (cleanName === 'mount baker' || cleanName.includes('mount baker')) {
                center = L.latLng(48.83, -121.95);
            } else if (cleanName === 'griffin') {
                center = L.latLng(47.10, -123.05);
            } else if (cleanName === 'olympia') {
                center = L.latLng(47.03, -122.95);
            } else if (cleanName === 'north thurston') {
                center = L.latLng(47.05, -122.80);
            } else if (cleanName === 'peninsula') {
                center = L.latLng(47.34, -122.65);
            } else if (cleanName === 'south kitsap') {
                center = L.latLng(47.45, -122.65);
            }

            const icon = L.divIcon({
                className: 'district-label',
                html: `<div>${name}<br>${formattedValue}<br>${baseFactor.toFixed(2)}</div>`
            });
            L.marker(center, { icon: icon, interactive: false }).addTo(labelsLayer);
        }
    }

    // Legend
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        const div = L.DomUtil.create('div', 'info legend');
        const grades = [1.00, 1.06, 1.12, 1.18];
        div.innerHTML += '<strong>Base Regionalization</strong><br><small>(Experience Factor grouped)</small><br>';
        for (let i = 0; i < grades.length; i++) {
            div.innerHTML +=
                '<i style="background:' + getColor(grades[i]) + '"></i> ' +
                grades[i].toFixed(2) + '<br>';
        }
        return div;
    };
    legend.addTo(map);

    // ── AUTO-LOAD GeoJSON from the same directory ──────────────────────────────
    function loadGeoJSON(geojsonData) {
        if (geojsonLayer) {
            map.removeLayer(geojsonLayer);
        }
        labelsLayer.clearLayers();

        geojsonLayer = L.geoJSON(geojsonData, {
            style: style,
            onEachFeature: onEachFeature
        }).addTo(map);

        map.fitBounds(geojsonLayer.getBounds());

        const mapEl = document.getElementById('map');
        if (map.getZoom() >= ZOOM_THRESHOLD) {
            labelsLayer.addTo(map);
            mapEl.classList.add('zoomed-in');
        } else {
            mapEl.classList.remove('zoomed-in');
        }

        const statusMsg = document.getElementById('status-msg');
        statusMsg.textContent = 'Map loaded successfully.';
        statusMsg.className = 'success';
    }

    fetch('Washington_School_Districts.geojson')
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} — file not found or not served`);
            }
            return response.json();
        })
        .then(geojsonData => {
            loadGeoJSON(geojsonData);
        })
        .catch(err => {
            const statusMsg = document.getElementById('status-msg');
            statusMsg.innerHTML = `<strong>Could not load GeoJSON.</strong><br>
                Make sure <code>Washington_School_Districts.geojson</code> is in the same folder as this HTML file
                and that you are serving both files via a local web server (e.g. <code>python -m http.server</code>),
                not opening the HTML directly as a <code>file://</code> URL.<br><br>
                <em>Error: ${err.message}</em>`;
            statusMsg.className = 'error';
            console.error('GeoJSON fetch error:', err);
        });

    // UI Minimization Toggle
    document.getElementById('minimize-btn').addEventListener('click', function() {
        const uiContainer = document.getElementById('ui-container');
        uiContainer.classList.toggle('minimized');
        this.textContent = uiContainer.classList.contains('minimized') ? '+' : '−';
    });

    // Quick Zoom Functions
    function zoomTo(region) {
        if (region === 'whatcom') {
            map.flyTo([48.70, -122.25], 10);
        } else if (region === 'kitsap') {
            map.flyTo([47.41, -122.65], 11);
        } else if (region === 'clark') {
            map.flyTo([45.75, -122.50], 10);
        }
    }
</script>
